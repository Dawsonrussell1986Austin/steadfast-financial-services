<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Steadfast CMS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo-dark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <img src="/assets/logo-dark.svg" alt="Steadfast" class="login-logo" />
    <h1>Content Manager</h1>
    <p class="login-sub">Enter your email and we'll send you a sign-in link.</p>

    <form id="loginForm" class="login-form" novalidate>
      <label>
        <span>Email</span>
        <input type="email" id="email" required autocomplete="email" placeholder="you@steadfastwealth.com" />
      </label>
      <button type="submit" class="btn-admin btn-primary login-btn">Email Me a Sign-In Link</button>
      <p id="loginError" class="login-error" role="alert"></p>
      <p id="loginSuccess" class="login-success" role="status"></p>
    </form>
  </main>

  <script type="module">
    import { supabase } from "/admin/supabase-client.js";

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const successEl = document.getElementById("loginSuccess");
    const btn = form.querySelector("button[type=submit]");

    const { data } = await supabase.auth.getSession();
    if (data.session) window.location.replace("/admin/");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      successEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Sending…";
      const email = document.getElementById("email").value.trim();
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: false,
          emailRedirectTo: window.location.origin + "/admin/login.html",
        },
      });
      if (error) {
        errorEl.textContent = error.message || "Couldn't send sign-in link.";
        btn.disabled = false;
        btn.textContent = "Email Me a Sign-In Link";
        return;
      }
      successEl.textContent = "Check your inbox for the sign-in link.";
      btn.textContent = "Link Sent";
    });
  </script>
</body>
</html>
